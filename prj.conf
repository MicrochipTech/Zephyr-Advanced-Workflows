# Enable the serial console
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_GPIO=y

# Disable OS-level inspection commands (threads, uptime, cycles, etc.)
CONFIG_KERNEL_SHELL=n

# Disable hardware device inspection commands
CONFIG_DEVICE_SHELL=n

# Disable standard terminal utilities (echo, clear, history, resize, etc.)
CONFIG_SHELL_CMDS=n

# Enable the Shell subsystem
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y

# Optional: Make the prompt look like a classic terminal
CONFIG_SHELL_PROMPT_UART="adventure:~$ "